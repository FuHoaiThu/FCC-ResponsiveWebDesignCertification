<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Styled To-Do List</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <ul class="todo-list">
      <li>
        <input type="checkbox" aria-label="todo" id="elsa" />
        <label for="elsa">Learn Elsa</label>
        <ul class="sub-item">
          <li>
            <a
              href="https://www.google.com/"
              class="sub-item-link"
              target="_blank"
              >Elsa Resources</a
            >
          </li>
        </ul>
      </li>
      <li>
        <input type="checkbox" aria-label="todo" id="vuejs" />
        <label for="vuejs">Learn Vuejs</label>
        <ul class="sub-item">
          <li>
            <a
              href="https://www.google.com/"
              class="sub-item-link"
              target="_blank"
              >Vuejs Resources</a
            >
          </li>
        </ul>
      </li>
      <li>
        <input type="checkbox" aria-label="todo" id="ielts-speaking" />
        <label for="ielts-speaking">Learn Ielts Speaking</label>
        <ul class="sub-item">
          <li>
            <a
              href="https://www.google.com/"
              class="sub-item-link"
              target="_blank"
              >Ielts Speaking Resources</a
            >
          </li>
        </ul>
      </li>
      <li>
        <input type="checkbox" aria-label="todo" id="ielts-grammar" />
        <label for="ielts-grammar">Learn Ielts Grammar</label>
        <ul class="sub-item">
          <li>
            <a
              href="https://www.google.com/"
              class="sub-item-link"
              target="_blank"
              >Ielts Grammar Resources</a
            >
          </li>
        </ul>
      </li>
    </ul>
  </body>
</html>
