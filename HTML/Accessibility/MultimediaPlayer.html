<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multimedia Player</title>
  </head>

  <body>
    <h1>Multimedia Player</h1>
    <section>
      <h2>Cặp đôi số 10</h2>
      <audio controls aria-label="Cặp đôi số 10 - HuyR">
        <source
          src="https://cdn.freecodecamp.org/curriculum/js-music-player/sailing-away.mp3"
          type="audio/mpeg"
        />
      </audio>
    </section>
    <section>
      <h2>Bạn đời</h2>
      <video width="640" controls aria-label="Bạn đời - Karik">
        <source
          src="https://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.mp4"
          type="video/mp4"
        />
        <track
          src="Below the source element, you should have a track element with a src attribute pointing to a subtitles file and a kind attribute, a srclang attribute and a label attribute. You are free to use this subtitles URL if you like: https://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.vtt"
          kind="subtitles"
          srclang="en"
          label="English"
        />
      </video>
    </section>
    <section>
      <h2>Transcript</h2>
      <p>Manifest T1 win</p>
    </section>
  </body>
</html>
